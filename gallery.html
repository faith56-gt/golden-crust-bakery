<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Crust Bakery – Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Gallery image hover effect */
    .gallery-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .gallery-img:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Golden Crust</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
          <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
          <li class="nav-item"><a class="nav-link" href="testimonials.html">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item ms-2"><button id="darkModeToggle">Dark</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="hero-section py-5">
    <div class="container text-center">
      <h1>Our Gallery</h1>
      <p>A visual feast — straight from our oven to your screen.</p>
    </div>
  </div>
   <!-- GALLERY GRID -->
  <section class="section-padding">
    <div class="container">
      <!-- Bootstrap 3-column grid, becomes 2 on tablet, 1 on mobile -->
      <div class="row g-3">
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Sourdough" class="gallery-img" alt="Sourdough loaf" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Croissants" class="gallery-img" alt="Fresh croissants" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Cakes" class="gallery-img" alt="Celebration cakes" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Bakery+Team" class="gallery-img" alt="Bakery team at work" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Pastries" class="gallery-img" alt="Assorted pastries" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Coffee+Pairing" class="gallery-img" alt="Coffee and pastry pairing" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Bread+Display" class="gallery-img" alt="Bread display shelf" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Muffins+Tray" class="gallery-img" alt="Fresh muffins on a tray" />
        </div>
        <div class="col-md-4 col-6">
          <img src="https://placehold.co/600x400?text=Morning+Bake" class="gallery-img" alt="Morning baking session" />
        </div>
      </div>
        <!-- LIGHTBOX MODAL — click image → bigger view -->
      <div class="modal fade" id="imgModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content bg-dark">
            <div class="modal-header border-0">
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
              <!-- Image will be inserted here by JS -->
              <img id="modalImage" src="" alt="Gallery image" class="img-fluid rounded" />
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>
